
<!-- ══════════════════════════════════════════════
     MODAL OVERLAY
══════════════════════════════════════════════ -->
<div class="auth-overlay" id="auth-overlay" onclick="closeAccountModal()"></div>

<!-- ══════════════════════════════════════════════
     MODAL PANEL
══════════════════════════════════════════════ -->
<div class="auth-modal" id="auth-modal" role="dialog" aria-modal="true" aria-label="Đăng nhập / Đăng ký">

  <!-- Close -->
  <button class="auth-close" onclick="closeAccountModal()" aria-label="Đóng">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" width="20" height="20">
      <path d="M18 6 6 18M6 6l12 12"/>
    </svg>
  </button>

  <!-- Brand -->
  <div class="auth-brand">
    <div class="auth-paw">🐾</div>
    <span class="auth-brand-name">Pet <span>Care</span> Spa</span>
  </div>

  <!-- Tab switcher -->
  <div class="auth-tabs" role="tablist">
    <button class="auth-tab active" id="tab-login"
            role="tab" aria-selected="true" aria-controls="panel-login"
            onclick="switchTab('login')">Đăng nhập</button>
    <button class="auth-tab" id="tab-register"
            role="tab" aria-selected="false" aria-controls="panel-register"
            onclick="switchTab('register')">Đăng ký</button>
    <div class="auth-tab-indicator" id="auth-tab-indicator"></div>
  </div>

  <!-- ── LOGIN PANEL ──────────────────────────── -->
  <div class="auth-panel active" id="panel-login" role="tabpanel">

    <p class="auth-welcome">Chào mừng trở lại! Đăng nhập để quản lý lịch hẹn.</p>

    <div class="auth-form">
      <div class="auth-field">
        <label class="auth-label" for="login-email">Email</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" width="18" height="18">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
          <input class="auth-input" id="login-email" type="email"
                 placeholder="haiphuong@gmail.com" autocomplete="email"/>
        </div>
      </div>

      <div class="auth-field">
        <div class="auth-label-row">
          <label class="auth-label" for="login-pass">Mật khẩu</label>
          <a href="#" class="auth-forgot">Quên mật khẩu?</a>
        </div>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" width="18" height="18">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input class="auth-input" id="login-pass" type="password"
                 placeholder="••••••••" autocomplete="current-password"/>
          <button class="auth-eye" type="button" onclick="togglePass('login-pass', this)" aria-label="Hiện mật khẩu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" width="18" height="18">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <label class="auth-remember">
        <input type="checkbox" class="auth-checkbox"/> Ghi nhớ đăng nhập
      </label>

      <button class="auth-btn-primary" onclick="handleLogin()">
        <span>Đăng nhập</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" width="18" height="18">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <div class="auth-divider"><span>hoặc</span></div>

      <button class="auth-btn-google">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Tiếp tục với Google
      </button>
    </div>

    <p class="auth-switch-text">
      Chưa có tài khoản?
      <button class="auth-switch-link" onclick="switchTab('register')">Đăng ký ngay</button>
    </p>

  </div><!-- /panel-login -->

  <!-- ── REGISTER PANEL ───────────────────────── -->
  <div class="auth-panel" id="panel-register" role="tabpanel">

    <p class="auth-welcome">Tạo tài khoản để đặt lịch và theo dõi bé cưng dễ dàng hơn.</p>

    <div class="auth-form">
      <div class="auth-row-2">
        <div class="auth-field">
          <label class="auth-label" for="reg-first">Họ</label>
          <div class="auth-input-wrap">
            <input class="auth-input" id="reg-first" type="text" placeholder="Nguyễn"/>
          </div>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="reg-last">Tên</label>
          <div class="auth-input-wrap">
            <input class="auth-input" id="reg-last" type="text" placeholder="Hải Phương"/>
          </div>
        </div>
      </div>

      <div class="auth-field">
        <label class="auth-label" for="reg-email">Email</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" width="18" height="18">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
          <input class="auth-input" id="reg-email" type="email"
                 placeholder="haiphuong@gmail.com" autocomplete="email"/>
        </div>
      </div>

      <div class="auth-field">
        <label class="auth-label" for="reg-phone">Số điện thoại</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" width="18" height="18">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.63 19 19.45 19.45 0 0 1 5 12.38 19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <input class="auth-input" id="reg-phone" type="tel"
                 placeholder="+84 901 234 567" autocomplete="tel"/>
        </div>
      </div>

      <div class="auth-field">
        <label class="auth-label" for="reg-pass">Mật khẩu</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" width="18" height="18">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input class="auth-input" id="reg-pass" type="password"
                 placeholder="Tối thiểu 8 ký tự" autocomplete="new-password"
                 oninput="checkStrength(this.value)"/>
          <button class="auth-eye" type="button" onclick="togglePass('reg-pass', this)" aria-label="Hiện mật khẩu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" width="18" height="18">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Password strength bar -->
        <div class="auth-strength">
          <div class="auth-strength-bar" id="strength-bar"></div>
        </div>
        <span class="auth-strength-label" id="strength-label"></span>
      </div>

      <div class="auth-field">
        <label class="auth-label" for="reg-pass2">Xác nhận mật khẩu</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" width="18" height="18">
            <path d="m9 12 2 2 4-4"/>
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input class="auth-input" id="reg-pass2" type="password"
                 placeholder="Nhập lại mật khẩu" autocomplete="new-password"/>
        </div>
      </div>

      <label class="auth-remember">
        <input type="checkbox" class="auth-checkbox" id="reg-terms"/>
        Tôi đồng ý với <a href="#" class="auth-forgot">Điều khoản dịch vụ</a>
      </label>

      <button class="auth-btn-primary" onclick="handleRegister()">
        <span>Tạo tài khoản</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" width="18" height="18">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <div class="auth-divider"><span>hoặc</span></div>

      <button class="auth-btn-google">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Đăng ký với Google
      </button>
    </div>

    <p class="auth-switch-text">
      Đã có tài khoản?
      <button class="auth-switch-link" onclick="switchTab('login')">Đăng nhập</button>
    </p>

  </div><!-- /panel-register -->

</div><!-- /auth-modal -->

<!-- ══════════════════════════════════════════════
     STYLES
══════════════════════════════════════════════ -->
<style>
/* OVERLAY */
.auth-overlay {
  position: fixed; inset: 0;
  background: rgba(26,14,18,.45);
  backdrop-filter: blur(6px);
  z-index: 900;
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
.auth-overlay.open { opacity: 1; pointer-events: all; }

/* MODAL */
.auth-modal {
  position: fixed;
  top: 53%; left: 50%;
  transform: translate(-50%, -48%) scale(.96);
  z-index: 901;
  width: min(480px, 94vw);
  max-height: 89vh;
  overflow-y: auto;
  background: #fff;
  border-radius: 28px;
  padding: 36px 36px 32px;
  box-shadow: 0 24px 80px rgba(26,14,18,.18);
  opacity: 0; pointer-events: none;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
  scrollbar-width: none;
}
.auth-modal::-webkit-scrollbar { display: none; }
.auth-modal.open {
  opacity: 1; pointer-events: all;
}

/* CLOSE */
.auth-close {
  position: absolute; top: 18px; right: 18px;
  width: 36px; height: 36px; border-radius: 50%;
  background: #f8f4f6; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #887278; transition: background .18s, color .18s;
}
.auth-close:hover { background: #f0e0e6; color: #a63558; }

/* BRAND */
.auth-brand {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 24px;
}
.auth-paw { font-size: 1.4rem; }
.auth-brand-name {
  font-family: 'Manrope', sans-serif;
  font-weight: 800; font-size: 1.05rem;
  color: #1a0e12;
}
.auth-brand-name span { color: #a63558; }

/* TABS */
.auth-tabs {
  position: relative;
  display: flex;
  background: #f8f4f6;
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 24px;
  gap: 0;
}

.auth-tab {
  flex: 1; border: none; background: none;
  font-family: 'Manrope', sans-serif;
  font-weight: 700; font-size: .88rem;
  color: #887278;
  padding: 10px 0;
  border-radius: 10px;
  cursor: pointer;
  position: relative; z-index: 1;
  transition: color .25s;
}
.auth-tab.active { color: #1a0e12; }

.auth-tab-indicator {
  position: absolute;
  top: 4px; bottom: 4px;
  left: 4px;
  width: calc(50% - 4px);
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(26,14,18,.08);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.auth-tab-indicator.right { transform: translateX(100%); }

/* PANELS */
.auth-panel { display: none; }
.auth-panel.active { display: block; animation: authFade .3s ease; }
@keyframes authFade {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* WELCOME TEXT */
.auth-welcome {
  font-size: .88rem; color: #887278;
  line-height: 1.65; margin: 0 0 22px;
}

/* FORM */
.auth-form { display: flex; flex-direction: column; gap: 16px; }
.auth-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.auth-field { display: flex; flex-direction: column; gap: 6px; }

.auth-label {
  font-size: .78rem; font-weight: 700;
  color: #4a3840; letter-spacing: .02em;
}

.auth-label-row {
  display: flex; justify-content: space-between; align-items: center;
}

.auth-input-wrap {
  position: relative; display: flex; align-items: center;
}

.auth-input-icon {
  position: absolute; left: 14px;
  color: #887278; pointer-events: none; flex-shrink: 0;
}

.auth-input {
  width: 100%;
  padding: 12px 16px 12px 42px;
  border: 1.5px solid #e3cdd5;
  border-radius: 14px;
  font-family: 'Manrope', sans-serif;
  font-size: .92rem; color: #1a0e12;
  background: #fff;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.auth-input::placeholder { color: #bba8ae; }
.auth-input:focus {
  border-color: #a63558;
  box-shadow: 0 0 0 4px rgba(166,53,88,.08);
}

/* No icon inputs (first/last name) */
.auth-row-2 .auth-input { padding-left: 16px; }

.auth-eye {
  position: absolute; right: 12px;
  background: none; border: none; cursor: pointer;
  color: #887278; padding: 4px;
  display: flex; align-items: center;
  transition: color .18s;
}
.auth-eye:hover { color: #a63558; }

.auth-forgot {
  font-size: .78rem; color: #a63558;
  font-weight: 600; text-decoration: none;
  transition: opacity .18s;
}
.auth-forgot:hover { opacity: .7; }

/* REMEMBER */
.auth-remember {
  display: flex; align-items: center; gap: 10px;
  font-size: .82rem; color: #4a3840; cursor: pointer;
}

.auth-checkbox {
  width: 18px; height: 18px;
  accent-color: #a63558;
  cursor: pointer;
  flex-shrink: 0;
  border-radius: 6px;
}

/* STRENGTH BAR */
.auth-strength {
  height: 4px; background: #f0e8eb;
  border-radius: 999px; margin-top: 6px;
  overflow: hidden;
}
.auth-strength-bar {
  height: 100%; width: 0%;
  border-radius: 999px;
  transition: width .35s, background .35s;
}
.auth-strength-label {
  font-size: .72rem; font-weight: 700;
  color: #887278; margin-top: 4px;
  display: block;
}

/* PRIMARY BTN */
.auth-btn-primary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px;
  background: #a63558; color: #fff;
  border: none; border-radius: 14px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700; font-size: .95rem;
  cursor: pointer;
  transition: background .2s, transform .15s, box-shadow .2s;
  box-shadow: 0 4px 16px rgba(166,53,88,.25);
}
.auth-btn-primary:hover {
  background: #7c2341;
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(166,53,88,.32);
}
.auth-btn-primary:active { transform: translateY(0); }

/* DIVIDER */
.auth-divider {
  display: flex; align-items: center; gap: 12px;
  color: #bba8ae; font-size: .78rem;
}
.auth-divider::before,
.auth-divider::after {
  content: ''; flex: 1; height: 1px; background: #ede7ea;
}

/* GOOGLE BTN */
.auth-btn-google {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 13px;
  background: #fff; color: #1a0e12;
  border: 1.5px solid #e3cdd5; border-radius: 14px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700; font-size: .9rem;
  cursor: pointer;
  transition: border-color .2s, background .2s, transform .15s;
}
.auth-btn-google:hover {
  border-color: #a63558; background: #fdf9fb;
  transform: translateY(-1px);
}

/* SWITCH TEXT */
.auth-switch-text {
  text-align: center; margin-top: 18px;
  font-size: .84rem; color: #887278;
}
.auth-switch-link {
  background: none; border: none;
  color: #a63558; font-weight: 700;
  font-family: 'Manrope', sans-serif;
  font-size: .84rem; cursor: pointer;
  transition: opacity .18s;
}
.auth-switch-link:hover { opacity: .7; }

/* RESPONSIVE */
@media (max-width: 480px) {
  .auth-modal { padding: 28px 22px 26px; }
  .auth-row-2 { grid-template-columns: 1fr; }
}
</style>
